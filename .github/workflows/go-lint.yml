name: Go Lint (reusable)

on:
  workflow_call:
    inputs:
      # Optional override. When empty, the Go toolchain is read from the
      # caller's go.mod (go-version-file).
      go-version:
        type: string
        required: false
        default: ""
      # Optional override. When empty, the version is read from the caller's
      # go.mod golangci-lint tool directive, falling back to LINT_VERSION_FALLBACK.
      lint-version:
        type: string
        required: false
        default: ""
      timeout:
        type: string
        required: false
        default: "10m"
    secrets:
      GH_APP_ID:
        required: true
      GH_APP_PRIVATE_KEY:
        required: true

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: getoptimum

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
          cache: true

      - name: Configure git for private modules
        run: |
          git config --global url."https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/".insteadOf "https://github.com/"
        env:
          GOPRIVATE: github.com/getoptimum

      - name: Resolve golangci-lint version
        id: lint-version
        env:
          LINT_VERSION_FALLBACK: "v2.9.0"
          INPUT_LINT_VERSION: ${{ inputs.lint-version }}
        run: |
          v="$INPUT_LINT_VERSION"
          if [ -z "$v" ]; then
            v="$(go mod edit -json | jq -r '.Require[]? | select(.Path=="github.com/golangci/golangci-lint/v2") | .Version')"
          fi
          if [ -z "$v" ]; then
            v="$LINT_VERSION_FALLBACK"
            echo "::notice::golangci-lint not pinned via go.mod tool directive; using fallback $v"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ steps.lint-version.outputs.version }}
          args: --timeout ${{ inputs.timeout }}
          only-new-issues: true
