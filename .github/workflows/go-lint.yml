name: Go Lint (reusable)

on:
  workflow_call:
    inputs:
      # Optional override. When empty, the Go toolchain is read from the
      # caller's go.mod (go-version-file).
      go-version:
        type: string
        required: false
        default: ""
      # Optional override. When empty, the version is read from the caller's
      # go.mod require entry for github.com/golangci/golangci-lint/v2 (pinned
      # alongside the tool directive by `go get -tool`), then LINT_VERSION_FALLBACK.
      lint-version:
        type: string
        required: false
        default: ""
      timeout:
        type: string
        required: false
        default: "10m"
    secrets:
      # Optional: only needed when the caller has private github.com/getoptimum
      # module deps. On public repos and fork PRs GitHub withholds secrets, so
      # these arrive empty and the token steps below are skipped.
      GH_APP_ID:
        required: false
      GH_APP_PRIVATE_KEY:
        required: false

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: go-lint-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    # Bridge presence to a boolean env so it can gate the token steps; the
    # `secrets` context is not usable directly in a step-level `if`, and this
    # keeps the secret values themselves out of the job environment.
    env:
      HAS_APP_CREDS: ${{ secrets.GH_APP_ID != '' && secrets.GH_APP_PRIVATE_KEY != '' }}
      # Job-scoped so it applies to the go/golangci-lint module resolution
      # below, keeping private module paths off the public proxy/checksum DB.
      # No-op for callers with only public deps.
      GOPRIVATE: github.com/getoptimum
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: generate-token
        if: ${{ env.HAS_APP_CREDS == 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: getoptimum

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
          cache: true

      - name: Configure git for private modules
        if: ${{ steps.generate-token.outputs.token != '' }}
        run: |
          git config --global url."https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Resolve golangci-lint version
        id: lint-version
        env:
          LINT_VERSION_FALLBACK: "v2.9.0"
          INPUT_LINT_VERSION: ${{ inputs.lint-version }}
        run: |
          v="$INPUT_LINT_VERSION"
          if [ -z "$v" ]; then
            v="$(go mod edit -json | jq -r '.Require[]? | select(.Path=="github.com/golangci/golangci-lint/v2") | .Version')"
          fi
          if [ -z "$v" ]; then
            v="$LINT_VERSION_FALLBACK"
            echo "::notice::golangci-lint not pinned via go.mod tool directive; using fallback $v"
          fi
          if ! [[ "$v" =~ ^(latest|v[0-9]+\.[0-9]+(\.[0-9]+)?([-+.][0-9A-Za-z.+-]+)?)$ ]]; then
            echo "::error::Invalid golangci-lint version: '$v'"
            exit 1
          fi
          printf 'version=%s\n' "$v" >> "$GITHUB_OUTPUT"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ steps.lint-version.outputs.version }}
          args: --timeout ${{ inputs.timeout }}
          only-new-issues: true
